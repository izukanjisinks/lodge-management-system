services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lodge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-lodge-management-system}
    ports:
      - "${DB_EXTERNAL_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-lodge-management-system}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Migrations (run once then exit) ───────────────────────────────────────
  migrate:
    image: migrate/migrate
    container_name: lodge-migrate
    volumes:
      - ./migrations:/migrations
    command: [
      "-path", "/migrations",
      "-database", "postgres://${DB_USER:-postgres}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-lodge-management-system}?sslmode=disable",
      "up"
    ]
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # ── Go API ─────────────────────────────────────────────────────────────────
  lodge-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lodge-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${API_PORT:-8082}:8081"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-lodge-management-system}
      DB_SSLMODE: disable
      SERVER_PORT: 8081
      JWT_SECRET: ${JWT_SECRET}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USERNAME: ${EMAIL_USERNAME}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-The Sanctuary}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-true}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-false}
      EMAIL_AUTH_METHOD: ${EMAIL_AUTH_METHOD:-PLAIN}

  # ── Back Office (staff SPA) ────────────────────────────────────────────────
  lodge-backoffice:
    build:
      context: ../Lodge-Management-System-Backoffice
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_BASE_URL: /management-dashboard/
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID}
    container_name: lodge-backoffice
    restart: unless-stopped
    depends_on:
      - lodge-api
    ports:
      - "${BACKOFFICE_PORT:-3000}:80"

  # ── Website (guest SPA) ────────────────────────────────────────────────────
  lodge-website:
    build:
      context: ../lodge-management-system-website
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    container_name: lodge-website
    restart: unless-stopped
    depends_on:
      - lodge-api
    ports:
      - "${WEBSITE_PORT:-3001}:80"

volumes:
  postgres_data:
